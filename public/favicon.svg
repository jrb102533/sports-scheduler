<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#15803d"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#bg)"/>
  <!-- Whistle body -->
  <rect x="13" y="11" width="15" height="10" rx="5" fill="white"/>
  <!-- Mouthpiece tube -->
  <rect x="5" y="14" width="11" height="4" rx="2" fill="white"/>
  <!-- Lanyard ring -->
  <circle cx="5.5" cy="16" r="2.5" fill="none" stroke="white" stroke-width="1.5"/>
  <!-- Pea hole (air inlet) -->
  <circle cx="24" cy="11" r="2" fill="url(#bg)"/>
  <!-- Sound wave 1 -->
  <path d="M29 14 Q31 16 29 18" fill="none" stroke="white" stroke-width="1.2" stroke-linecap="round" opacity="0.75"/>
</svg>
