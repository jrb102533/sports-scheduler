name: E2E Full Suite — Staging

# Full Playwright suite on a schedule or on-demand.
#
#   - Nightly at 02:00 UTC — only if commits landed on main in the last 24 hours
#   - Manual dispatch — optional --grep filter to narrow scope

on:
  schedule:
    - cron: '0 2 * * *'

  workflow_dispatch:
    inputs:
      grep:
        description: 'Playwright --grep filter (leave blank for full suite)'
        required: false
        default: ''

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-activity:
    name: Check for recent commits
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'schedule' }}
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commits to main in last 24h
        id: check
        run: |
          COUNT=$(git log --oneline --since="24 hours ago" origin/main | wc -l | tr -d ' ')
          echo "Commits in last 24h: $COUNT"
          echo "has_commits=$( [ "$COUNT" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

  e2e-full:
    name: Playwright Full Suite — Staging
    runs-on: ubuntu-latest
    needs: [check-activity]
    if: |
      always() && (
        (github.event_name == 'schedule' && needs.check-activity.outputs.has_commits == 'true') ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write service account credentials
        run: |
          if [ -n "${{ secrets.E2E_FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "${{ secrets.E2E_FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/sa.json
            echo "Service account written to /tmp/sa.json"
          else
            echo "E2E_FIREBASE_SERVICE_ACCOUNT_JSON not set — seeding will be skipped"
          fi

      - name: Run full suite
        env:
          E2E_BASE_URL: https://first-whistle-e76f4.web.app
          E2E_STAGING_URL: https://first-whistle-e76f4.web.app
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_STAGING_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_STAGING_ADMIN_PASSWORD }}
          E2E_PARENT_EMAIL: ${{ secrets.E2E_STAGING_PARENT_EMAIL }}
          E2E_PARENT_PASSWORD: ${{ secrets.E2E_STAGING_PARENT_PASSWORD }}
          E2E_MUST_CHANGE_EMAIL: ${{ secrets.E2E_MUST_CHANGE_EMAIL }}
          E2E_MUST_CHANGE_PASSWORD: ${{ secrets.E2E_MUST_CHANGE_PASSWORD }}
          E2E_CONSENT_OUTDATED_EMAIL: ${{ secrets.E2E_CONSENT_OUTDATED_EMAIL }}
          E2E_CONSENT_OUTDATED_PASSWORD: ${{ secrets.E2E_CONSENT_OUTDATED_PASSWORD }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          E2E_COACH_EMAIL: ${{ secrets.E2E_COACH_EMAIL }}
          E2E_COACH_PASSWORD: ${{ secrets.E2E_COACH_PASSWORD }}
          E2E_LM_EMAIL: ${{ secrets.E2E_LM_EMAIL }}
          E2E_LM_PASSWORD: ${{ secrets.E2E_LM_PASSWORD }}
          E2E_AVAIL_LEAGUE_ID: ${{ secrets.E2E_AVAIL_LEAGUE_ID }}
          E2E_AVAIL_COLLECTION_ID: ${{ secrets.E2E_AVAIL_COLLECTION_ID }}
          E2E_FUNCTIONS_BASE: ${{ secrets.E2E_FUNCTIONS_BASE }}
          E2E_RSVP_HMAC_SECRET: ${{ secrets.E2E_RSVP_HMAC_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
          PLAYWRIGHT_GREP: ${{ github.event.inputs.grep }}
        run: |
          if [ -n "$PLAYWRIGHT_GREP" ]; then
            npx playwright test --project=chromium --project=staging --grep "$PLAYWRIGHT_GREP"
          else
            npx playwright test --project=chromium --project=staging
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-full
          path: playwright-report/
          retention-days: 14
