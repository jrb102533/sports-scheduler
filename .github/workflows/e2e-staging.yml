name: E2E — Staging

# Three-tier cost-optimised E2E strategy:
#
#   1. Smoke suite  — runs after every deploy to main (fast, cheap, catches critical regressions)
#   2. Full suite   — runs nightly at 02:00 UTC (comprehensive, once-a-day cap)
#   3. Manual full  — workflow_dispatch with optional grep filter for ad-hoc / pre-release runs
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   E2E_ADMIN_EMAIL / E2E_ADMIN_PASSWORD
#   E2E_PARENT_EMAIL / E2E_PARENT_PASSWORD
#   E2E_PLAYER_EMAIL / E2E_PLAYER_PASSWORD
#   E2E_COACH_EMAIL / E2E_COACH_PASSWORD
#   E2E_LM_EMAIL / E2E_LM_PASSWORD
#   E2E_MUST_CHANGE_EMAIL / E2E_MUST_CHANGE_PASSWORD
#   E2E_CONSENT_OUTDATED_EMAIL / E2E_CONSENT_OUTDATED_PASSWORD
#   E2E_AVAIL_LEAGUE_ID / E2E_AVAIL_COLLECTION_ID
#   E2E_FIREBASE_SERVICE_ACCOUNT_JSON  — base64-encoded staging service account JSON
#   E2E_FUNCTIONS_BASE                 — Cloud Functions base URL for staging
#   E2E_RSVP_HMAC_SECRET               — HMAC secret for one-tap RSVP links

on:
  # 1. Smoke suite after every successful deploy to main
  workflow_run:
    workflows: ["Deploy to Firebase"]
    types: [completed]
    branches: [main]

  # 2. Full suite nightly at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # 3. Manual — full suite by default; pass grep to narrow
  workflow_dispatch:
    inputs:
      grep:
        description: 'Playwright --grep filter (leave blank for full suite)'
        required: false
        default: ''

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-activity:
    name: Check for recent commits
    runs-on: ubuntu-latest
    # Only needed for scheduled runs — other triggers always proceed
    if: ${{ github.event_name == 'schedule' }}
    outputs:
      has_commits: ${{ steps.check.outputs.has_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commits to main in last 24h
        id: check
        run: |
          COUNT=$(git log --oneline --since="24 hours ago" origin/main | wc -l | tr -d ' ')
          echo "Commits in last 24h: $COUNT"
          echo "has_commits=$( [ "$COUNT" -gt 0 ] && echo true || echo false )" >> $GITHUB_OUTPUT

  e2e-staging:
    name: Playwright E2E — Staging
    runs-on: ubuntu-latest
    needs: [check-activity]
    # - workflow_run: only if deploy succeeded
    # - schedule: only if check-activity found commits (skip on idle days)
    # - workflow_dispatch: always run
    if: |
      always() && (
        (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') ||
        (github.event_name == 'schedule' && needs.check-activity.outputs.has_commits == 'true') ||
        github.event_name == 'workflow_dispatch'
      )

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write service account credentials
        run: |
          if [ -n "${{ secrets.E2E_FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "${{ secrets.E2E_FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/sa.json
            echo "Service account written to /tmp/sa.json"
          else
            echo "E2E_FIREBASE_SERVICE_ACCOUNT_JSON not set — seeding will be skipped"
          fi

      - name: Run E2E — smoke suite (post-deploy)
        if: ${{ github.event_name == 'workflow_run' }}
        env:
          E2E_BASE_URL: https://first-whistle-e76f4.web.app
          E2E_STAGING_URL: https://first-whistle-e76f4.web.app
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
          E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
          E2E_MUST_CHANGE_EMAIL: ${{ secrets.E2E_MUST_CHANGE_EMAIL }}
          E2E_MUST_CHANGE_PASSWORD: ${{ secrets.E2E_MUST_CHANGE_PASSWORD }}
          E2E_CONSENT_OUTDATED_EMAIL: ${{ secrets.E2E_CONSENT_OUTDATED_EMAIL }}
          E2E_CONSENT_OUTDATED_PASSWORD: ${{ secrets.E2E_CONSENT_OUTDATED_PASSWORD }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          E2E_COACH_EMAIL: ${{ secrets.E2E_COACH_EMAIL }}
          E2E_COACH_PASSWORD: ${{ secrets.E2E_COACH_PASSWORD }}
          E2E_LM_EMAIL: ${{ secrets.E2E_LM_EMAIL }}
          E2E_LM_PASSWORD: ${{ secrets.E2E_LM_PASSWORD }}
          E2E_AVAIL_LEAGUE_ID: ${{ secrets.E2E_AVAIL_LEAGUE_ID }}
          E2E_AVAIL_COLLECTION_ID: ${{ secrets.E2E_AVAIL_COLLECTION_ID }}
          E2E_FUNCTIONS_BASE: ${{ secrets.E2E_FUNCTIONS_BASE }}
          E2E_RSVP_HMAC_SECRET: ${{ secrets.E2E_RSVP_HMAC_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: npx playwright test --project=chromium --project=staging --grep @smoke

      - name: Run E2E — full suite (nightly or manual)
        if: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
        env:
          E2E_BASE_URL: https://first-whistle-e76f4.web.app
          E2E_STAGING_URL: https://first-whistle-e76f4.web.app
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_ADMIN_PASSWORD }}
          E2E_PARENT_EMAIL: ${{ secrets.E2E_PARENT_EMAIL }}
          E2E_PARENT_PASSWORD: ${{ secrets.E2E_PARENT_PASSWORD }}
          E2E_MUST_CHANGE_EMAIL: ${{ secrets.E2E_MUST_CHANGE_EMAIL }}
          E2E_MUST_CHANGE_PASSWORD: ${{ secrets.E2E_MUST_CHANGE_PASSWORD }}
          E2E_CONSENT_OUTDATED_EMAIL: ${{ secrets.E2E_CONSENT_OUTDATED_EMAIL }}
          E2E_CONSENT_OUTDATED_PASSWORD: ${{ secrets.E2E_CONSENT_OUTDATED_PASSWORD }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          E2E_COACH_EMAIL: ${{ secrets.E2E_COACH_EMAIL }}
          E2E_COACH_PASSWORD: ${{ secrets.E2E_COACH_PASSWORD }}
          E2E_LM_EMAIL: ${{ secrets.E2E_LM_EMAIL }}
          E2E_LM_PASSWORD: ${{ secrets.E2E_LM_PASSWORD }}
          E2E_AVAIL_LEAGUE_ID: ${{ secrets.E2E_AVAIL_LEAGUE_ID }}
          E2E_AVAIL_COLLECTION_ID: ${{ secrets.E2E_AVAIL_COLLECTION_ID }}
          E2E_FUNCTIONS_BASE: ${{ secrets.E2E_FUNCTIONS_BASE }}
          E2E_RSVP_HMAC_SECRET: ${{ secrets.E2E_RSVP_HMAC_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: |
          GREP="${{ github.event.inputs.grep }}"
          if [ -n "$GREP" ]; then
            npx playwright test --project=chromium --project=staging --grep "$GREP"
          else
            npx playwright test --project=chromium --project=staging
          fi

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 14

      - name: Post result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const conclusion = '${{ job.status }}';
            const sha = '${{ github.event.workflow_run.head_sha || github.sha }}'.slice(0, 7);
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const icon = conclusion === 'success' ? '✅' : '❌';
            const label = conclusion === 'success' ? 'passed' : 'FAILED';
            const suite = '${{ github.event_name }}' === 'workflow_run' ? 'smoke' : 'full';

            // Only comment on PRs for post-deploy runs
            if ('${{ github.event_name }}' !== 'workflow_run') return;

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            });

            const pr = prs.find(p => p.merge_commit_sha?.startsWith('${{ github.event.workflow_run.head_sha }}') ||
                                     p.head.sha === '${{ github.event.workflow_run.head_sha }}');
            if (!pr) return;

            const body = [
              `## ${icon} Staging E2E (${suite}) ${label}`,
              '',
              `Playwright ran against staging after deploy of \`${sha}\`.`,
              '',
              `[View full report](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
