name: E2E — Staging

# Runs the full Playwright UAT suite against staging after every deploy to main.
# Triggered by the completion of the "Deploy to Firebase" workflow.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   E2E_STAGING_ADMIN_EMAIL      — admin test account email on staging
#   E2E_STAGING_ADMIN_PASSWORD   — admin test account password on staging
#   E2E_STAGING_PARENT_EMAIL     — parent test account email on staging
#   E2E_STAGING_PARENT_PASSWORD  — parent test account password on staging

on:
  workflow_run:
    workflows: ["Deploy to Firebase"]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-staging:
    name: Playwright E2E — Staging
    runs-on: ubuntu-latest
    # Only run if the deploy succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E against staging
        env:
          STAGING_URL: https://first-whistle-e76f4.web.app
          E2E_STAGING_ADMIN_EMAIL: ${{ secrets.E2E_STAGING_ADMIN_EMAIL }}
          E2E_STAGING_ADMIN_PASSWORD: ${{ secrets.E2E_STAGING_ADMIN_PASSWORD }}
          E2E_STAGING_PARENT_EMAIL: ${{ secrets.E2E_STAGING_PARENT_EMAIL }}
          E2E_STAGING_PARENT_PASSWORD: ${{ secrets.E2E_STAGING_PARENT_PASSWORD }}
        run: npm run test:e2e:staging

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 14

      - name: Post result to PR
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const conclusion = '${{ job.status }}';
            const sha = '${{ github.event.workflow_run.head_sha }}'.slice(0, 7);
            const runUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const icon = conclusion === 'success' ? '✅' : '❌';
            const label = conclusion === 'success' ? 'passed' : 'FAILED';

            // Find the PR associated with this commit
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            });

            const pr = prs.find(p => p.merge_commit_sha?.startsWith('${{ github.event.workflow_run.head_sha }}') ||
                                     p.head.sha === '${{ github.event.workflow_run.head_sha }}');
            if (!pr) return;

            const body = [
              `## ${icon} Staging E2E ${label}`,
              '',
              `Playwright UAT ran against staging after deploy of \`${sha}\`.`,
              '',
              `[View full report](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
