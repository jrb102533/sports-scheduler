name: Release

# Creates a CalVer-tagged GitHub Release with build artifacts and deploys to Firebase.
#
# CalVer format: vYYYY.MM.DD.N  (N increments if multiple releases on the same day)
# Example: v2026.03.29.1, v2026.03.29.2
#
# Required GitHub secrets:
#   FIREBASE_TOKEN_PROD — long-lived CI token for first-whistle-prod (set as environment secret on 'production')
#   GITHUB_TOKEN        — auto-provided by Actions

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      increment:
        description: 'CalVer increment (always increments N for same-day releases)'
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
      notes:
        description: 'Release notes (optional)'
        type: string
        required: false

jobs:
  # ── Compute CalVer tag ─────────────────────────────────────────────────────
  compute-tag:
    name: Compute CalVer Tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.calver.outputs.tag }}
      version: ${{ steps.calver.outputs.version }}
      build_time: ${{ steps.calver.outputs.build_time }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history required to read all existing tags

      - name: Compute next CalVer tag
        id: calver
        run: |
          TODAY=$(date -u '+%Y.%m.%d')
          BUILD_TIME=$(date -u '+%Y-%m-%dT%H:%M:%SZ')

          # Find the highest N for today's date across all matching tags
          LATEST_N=$(git tag --list "v${TODAY}.*" \
            | grep -oP '(?<=v'"${TODAY//./\\.}"'\.)\d+' \
            | sort -n \
            | tail -1)

          if [ -z "$LATEST_N" ]; then
            N=1
          else
            N=$(( LATEST_N + 1 ))
          fi

          TAG="v${TODAY}.${N}"
          VERSION="${TODAY}.${N}"

          echo "tag=$TAG"         >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "build_time=$BUILD_TIME" >> $GITHUB_OUTPUT
          echo "Computed tag: $TAG"

  # ── Build frontend ─────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: compute-tag
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APP_VERSION: ${{ needs.compute-tag.outputs.version }}
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ needs.compute-tag.outputs.build_time }}
          VITE_BUILD_BRANCH: main
          VITE_APP_ENV: production
        run: npm run build

      - name: Create frontend artifact archive
        run: tar -czf frontend-dist.tar.gz -C dist .

      - name: Upload frontend archive
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz
          retention-days: 7

  # ── Build + test Cloud Functions ───────────────────────────────────────────
  build-functions:
    name: Build & Test Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Test
        working-directory: functions
        run: npm test

      - name: Create functions artifact archive
        run: tar -czf functions-lib.tar.gz -C functions/lib .

      - name: Upload functions archive
        uses: actions/upload-artifact@v4
        with:
          name: functions-lib
          path: functions-lib.tar.gz
          retention-days: 7

  # ── Create GitHub Release ──────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [compute-tag, build-frontend, build-functions]
    permissions:
      contents: write
    steps:
      - name: Download frontend archive
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Download functions archive
        uses: actions/download-artifact@v4
        with:
          name: functions-lib

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.compute-tag.outputs.tag }}
          NOTES: ${{ inputs.notes }}
        run: |
          BODY="## Release ${TAG}"$'\n\n'
          if [ -n "$NOTES" ]; then
            BODY="${BODY}${NOTES}"$'\n\n'
          fi
          BODY="${BODY}**Built from:** \`${{ github.sha }}\`  "$'\n'
          BODY="${BODY}**Build time:** \`${{ needs.compute-tag.outputs.build_time }}\`  "$'\n'
          BODY="${BODY}**Triggered by:** \`${{ github.actor }}\`"

          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "Release ${TAG}" \
            --notes "$BODY" \
            --latest \
            frontend-dist.tar.gz \
            functions-lib.tar.gz


  # ── Smoke reminder (NON-BLOCKING) ──────────────────────────────────────────
  # Surfaces a clearly visible PASS / NO RUN / FAIL for the SHA being deployed
  # so you can make an informed call at the production environment approval
  # gate. Never blocks the deploy — the human approval on `environment:
  # production` is the actual gate.
  smoke-reminder:
    name: Smoke Status Reminder
    runs-on: ubuntu-latest
    needs: [compute-tag, build-frontend, build-functions, release]
    permissions:
      actions: read
    steps:
      - name: Look up smoke run for this SHA
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Querying E2E Smoke — Staging for SHA: $SHA"

          RUN_JSON=$(gh run list \
            --repo "$REPO" \
            --workflow=e2e-smoke.yml \
            --commit="$SHA" \
            --json conclusion,status,databaseId,url \
            --limit=1)

          echo "API response: $RUN_JSON"

          if [ "$(echo "$RUN_JSON" | jq 'length')" -eq 0 ]; then
            {
              echo "## Smoke status: NO RUN for this SHA"
              echo ""
              echo "No E2E Smoke — Staging run found for \`$SHA\`."
              echo ""
              echo "Smoke is no longer fired automatically. To run it now:"
              echo "**Actions -> E2E Smoke — Staging -> Run workflow -> SHA \`$SHA\`**"
              echo ""
              echo "_This is a reminder, not a blocker. The production environment approval gate is what actually decides._"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::No smoke run found for $SHA. Consider running smoke before approving production."
            exit 0
          fi

          STATUS=$(echo "$RUN_JSON" | jq -r '.[0].status')
          CONCLUSION=$(echo "$RUN_JSON" | jq -r '.[0].conclusion')
          RUN_URL=$(echo "$RUN_JSON" | jq -r '.[0].url')

          if [ "$STATUS" = "in_progress" ] || [ "$STATUS" = "queued" ] || [ "$STATUS" = "waiting" ]; then
            {
              echo "## Smoke status: STILL RUNNING"
              echo ""
              echo "Smoke run for \`$SHA\` is currently \`$STATUS\`."
              echo ""
              echo "[View live progress]($RUN_URL)"
              echo ""
              echo "_Wait for it to finish before deciding at the approval gate._"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Smoke for $SHA is still $STATUS — wait before approving."
            exit 0
          fi

          if [ "$CONCLUSION" != "success" ]; then
            {
              echo "## Smoke status: FAILED"
              echo ""
              echo "Smoke run for \`$SHA\` concluded with: **$CONCLUSION**"
              echo ""
              echo "[Inspect the failing run]($RUN_URL)"
              echo ""
              echo "_Strongly consider rejecting the production approval gate and investigating._"
            } >> "$GITHUB_STEP_SUMMARY"
            echo "::warning::Smoke FAILED for $SHA — review before approving production."
            exit 0
          fi

          {
            echo "## Smoke status: PASSED"
            echo ""
            echo "Smoke run for \`$SHA\` passed."
            echo ""
            echo "[View full report]($RUN_URL)"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── Deploy ─────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [compute-tag, build-frontend, build-functions, release, smoke-reminder]
    environment: production
    permissions: {}   # No GITHUB_TOKEN capability needed — uses FIREBASE_TOKEN_PROD only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Download frontend archive
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist

      - name: Extract frontend dist
        run: mkdir -p dist && tar -xzf frontend-dist.tar.gz -C dist

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        working-directory: functions
        run: npm ci

      - name: Download functions archive
        uses: actions/download-artifact@v4
        with:
          name: functions-lib

      - name: Extract functions lib
        run: mkdir -p functions/lib && tar -xzf functions-lib.tar.gz -C functions/lib

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@15.12.0

      - name: Deploy to Firebase (production)
        # `--only` explicitly scopes the deploy and excludes `extensions`. The
        # firestore-stripe-payments extension (PR #604) is configured in
        # firebase.json but its STRIPE_API_KEY secret is intentionally NOT set
        # in production yet — payments aren't live. When you're ready to flip
        # on Stripe in prod: (1) create the live STRIPE_API_KEY in Secret
        # Manager on first-whistle-prod, (2) add `extensions` to the --only
        # list (or remove --only entirely).
        run: firebase deploy --token "${{ secrets.FIREBASE_TOKEN_PROD }}" --project first-whistle-prod --non-interactive --force --only hosting,functions,firestore,storage
