name: E2E Emulator

# Runs @emu-tagged Playwright specs against the local Firebase Emulator Suite
# instead of staging. Zero Firestore cost, no network latency, real rules.
#
# Phase 1 (issue #466): runs on every PR + push to main as a proof of concept.
# Phase 2 (issue #466): path-based filtering — only specs whose domain bucket
#   changed on this PR are executed. Bucket → spec mapping lives in
#   .github/path-filters.yml. If "shared" or "rules" changed, all @emu specs run.

on:
  pull_request:
    branches: [main]
    # Only run when changes could actually affect E2E coverage. Skips docs-only
    # and script-only PRs — those have their own CI lanes and can't break
    # UI/rules-level flows. Functions are included (Phase 3b) because callable-
    # backed specs now run against the Functions emulator.
    paths:
      - 'src/**'
      - 'e2e/**'
      - 'functions/**'
      - 'public/**'
      - 'index.html'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - 'playwright.config.ts'
      - 'vite.config.ts'
      - 'vitest.config.ts'
      - 'tailwind.config.*'
      - 'package.json'
      - 'package-lock.json'
      - '.env.emulator'
      - '.github/workflows/e2e-emulator.yml'
      - '.github/path-filters.yml'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-emulator:
    name: Playwright — Firebase Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      # ── Phase 2: compute which domain buckets changed ────────────────────────
      # dorny/paths-filter outputs one boolean per bucket key (e.g. "auth=true").
      # "shared" triggers all — layouts, router, seed, fixtures, config changes.
      # "rules" also triggers all because a rules change can affect any bucket.
      - name: Detect changed path buckets
        id: buckets
        # Only meaningful on pull_request; on push to main or workflow_dispatch
        # we always run all specs (GREP stays empty = match everything).
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: .github/path-filters.yml

      # Build the --grep expression from the changed buckets.
      # If "shared" or "rules" changed, GREP is left empty → all @emu specs run.
      # Otherwise, GREP becomes "@(auth|teams|events|…)" matching only changed tags.
      - name: Build Playwright grep expression
        id: grep
        if: github.event_name == 'pull_request'
        env:
          BUCKET_ADMIN: ${{ steps.buckets.outputs.admin }}
          BUCKET_AUTH: ${{ steps.buckets.outputs.auth }}
          BUCKET_TEAMS: ${{ steps.buckets.outputs.teams }}
          BUCKET_EVENTS: ${{ steps.buckets.outputs.events }}
          BUCKET_SCHEDULE: ${{ steps.buckets.outputs.schedule }}
          BUCKET_MESSAGING: ${{ steps.buckets.outputs.messaging }}
          BUCKET_LEAGUES: ${{ steps.buckets.outputs.leagues }}
          BUCKET_VENUES: ${{ steps.buckets.outputs.venues }}
          BUCKET_RULES: ${{ steps.buckets.outputs.rules }}
          BUCKET_SHARED: ${{ steps.buckets.outputs.shared }}

        run: |
          # Shared or rules always runs everything — no grep filter.
          if [ "$BUCKET_SHARED" = "true" ] || [ "$BUCKET_RULES" = "true" ]; then
            echo "expression=" >> "$GITHUB_OUTPUT"
            echo "reason=shared/rules changed — running all @emu specs" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          tags=()
          [ "$BUCKET_ADMIN"     = "true" ] && tags+=("admin")
          [ "$BUCKET_AUTH"      = "true" ] && tags+=("auth")
          [ "$BUCKET_TEAMS"     = "true" ] && tags+=("teams")
          [ "$BUCKET_EVENTS"    = "true" ] && tags+=("events")
          [ "$BUCKET_SCHEDULE"  = "true" ] && tags+=("schedule")
          [ "$BUCKET_MESSAGING" = "true" ] && tags+=("messaging")
          [ "$BUCKET_LEAGUES"   = "true" ] && tags+=("leagues")
          [ "$BUCKET_VENUES"    = "true" ] && tags+=("venues")

          if [ ${#tags[@]} -eq 0 ]; then
            # No E2E-relevant paths changed (e.g. docs-only PR that still
            # passes the outer paths: filter). The playwright step will run
            # with a grep that matches nothing, so it exits 0 with 0 tests.
            echo "expression=@__no_bucket_matched__" >> "$GITHUB_OUTPUT"
            echo "reason=no domain buckets changed — Playwright will run 0 specs" >> "$GITHUB_OUTPUT"
          else
            joined=$(IFS='|'; echo "${tags[*]}")
            echo "expression=@(${joined})" >> "$GITHUB_OUTPUT"
            echo "reason=running buckets: ${joined}" >> "$GITHUB_OUTPUT"
          fi

      - name: Log grep decision
        run: |
          echo "Bucket grep: ${{ steps.grep.outputs.expression }}"
          echo "Reason:      ${{ steps.grep.outputs.reason }}"

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Lint (incl. no-unscoped-collection-read)
        run: npx eslint src functions/src

      - name: Check Firestore composite indexes (advisory)
        run: node scripts/check-firestore-indexes.mjs

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14

      - name: Install Functions dependencies
        run: npm --prefix functions ci

      - name: Build Functions bundle
        run: npm --prefix functions run build

      - name: Write Functions secret overrides for emulator
        # The Functions emulator cannot reach Google Cloud Secret Manager in CI.
        # Without .secret.local, defineSecret() at module top-level marks all
        # secrets as unavailable and the emulator refuses to serve any function
        # in the module — including createTeamAndBecomeCoach, which does not
        # actually use SMTP. Dummy values satisfy the emulator's startup check;
        # no real email is sent by the specs under test.
        run: |
          printf 'SMTP_HOST=emulator.local\nSMTP_PORT=587\nSMTP_USER=emulator\nSMTP_PASS=emulator\nEMAIL_FROM=no-reply@emulator.local\nRSVP_HMAC_SECRET=emulator-hmac-secret-32-chars-pad\nICAL_SECRET=emulator-ical-secret-32-chars-pad\n' > functions/.secret.local

      - name: Build app in emulator mode
        run: npm run build:emulator

      - name: Run Playwright against emulator
        # Skip the run entirely when no domain bucket matched (e.g. PR only
        # touched non-emu staging specs). The sentinel grep would otherwise
        # cause Playwright to exit 1 on "no tests matched".
        if: steps.grep.outputs.expression != '@__no_bucket_matched__'
        env:
          E2E_TIER: emulator
          E2E_BASE_URL: http://localhost:5173
          E2E_EMULATOR_URL: http://localhost:5173
          # Phase 2: pass the computed grep to Playwright. Empty string on push
          # to main or workflow_dispatch (all specs run). On PRs, contains the
          # ORed bucket tags built above.
          E2E_GREP: ${{ steps.grep.outputs.expression }}
        # Phase 3b: emulators boot → seed runs → Vite preview starts → Playwright runs
        # against the emulator suite (auth/firestore/storage/functions). Functions bundle
        # must be built before emulators:exec so the Functions emulator can load lib/index.js.
        #
        # Phase 2 grep logic:
        #   - E2E_GREP empty  → no --grep flag → all @emu specs run (push to main / workflow_dispatch)
        #   - E2E_GREP set    → --grep "<expression>" → only matching bucket specs run
        #   The shell conditional below builds the flag only when E2E_GREP is non-empty.
        run: |
          GREP_FLAG=""
          if [ -n "$E2E_GREP" ]; then
            GREP_FLAG="--grep \"$E2E_GREP\""
          fi
          firebase emulators:exec \
            --project=first-whistle-e76f4 \
            --only=auth,firestore,storage,functions \
            "npx vite preview --mode emulator --port 5173 --host 127.0.0.1 & \
             VITE_PID=\$!; \
             npx wait-on http://127.0.0.1:5173 -t 60000; \
             npx tsx e2e/seed-emulator.ts || { kill \$VITE_PID 2>/dev/null || true; exit 1; }; \
             npx playwright test --project=emulator $GREP_FLAG; \
             EXIT=\$?; \
             kill \$VITE_PID 2>/dev/null || true; \
             exit \$EXIT"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-emulator
          path: playwright-report/
          retention-days: 7

      - name: Upload Firestore read-count artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: firestore-reads
          path: e2e/.read-counts/
          retention-days: 30
          if-no-files-found: ignore

      - name: Comment Firestore read totals on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const dir = 'e2e/.read-counts';
            if (!fs.existsSync(dir)) {
              core.info('No read-count artifacts produced; skipping comment.');
              return;
            }
            const records = [];
            for (const f of fs.readdirSync(dir)) {
              const lines = fs.readFileSync(path.join(dir, f), 'utf8').trim().split('\n').filter(Boolean);
              for (const line of lines) {
                try { records.push(JSON.parse(line)); } catch { /* ignore */ }
              }
            }
            if (records.length === 0) return;
            const total = records.reduce((s, r) => s + (r.reads ?? 0), 0);
            const overBudget = records.filter(r => (r.reads ?? 0) > (r.budget ?? 100));
            const top = [...records].sort((a, b) => (b.reads ?? 0) - (a.reads ?? 0)).slice(0, 5);
            const rows = top.map(r => `| \`${r.title}\` | ${r.reads} / ${r.budget} |`).join('\n');
            const body = [
              '### Firestore read counts (emulator)',
              `Total reads across ${records.length} tests: **${total}**`,
              overBudget.length
                ? `:warning: ${overBudget.length} test(s) over budget — see job logs.`
                : 'All tests within per-test budget.',
              '',
              '| Top 5 by reads | reads / budget |',
              '|---|---|',
              rows || '| _(no data)_ | _(n/a)_ |',
              '',
              '_Source: `e2e/.read-counts/` artifact. Counts HTTP fetches to the emulator — a regression-detection signal, not a billing meter._',
            ].join('\n');
            const pr = context.payload.pull_request.number;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
              body,
            });
