name: E2E Emulator

# Runs @emu-tagged Playwright specs against the local Firebase Emulator Suite
# instead of staging. Zero Firestore cost, no network latency, real rules.
#
# Phase 1 (issue #466): runs on every PR + push to main as a proof of concept.
# Phase 2 will add path-based filtering so only affected domains run.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-emulator:
    name: Playwright — Firebase Emulator
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Install Firebase CLI
        run: npm install -g firebase-tools@14

      - name: Build app in emulator mode
        run: npm run build:emulator

      - name: Run Playwright against emulator
        env:
          E2E_TIER: emulator
          E2E_BASE_URL: http://localhost:5173
          E2E_EMULATOR_URL: http://localhost:5173
        # Phase 1: no --import (emulator-data is gitignored). Phase 2 will add
        # a deterministic seed script that boots test roles + fixtures into the
        # running emulators before Playwright starts.
        run: |
          firebase emulators:exec \
            --project=first-whistle-e76f4 \
            --only=auth,firestore,storage \
            "npx vite preview --mode emulator --port 5173 --host 127.0.0.1 & \
             VITE_PID=\$!; \
             npx wait-on http://127.0.0.1:5173 -t 60000; \
             npx playwright test --project=emulator; \
             EXIT=\$?; \
             kill \$VITE_PID 2>/dev/null || true; \
             exit \$EXIT"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-emulator
          path: playwright-report/
          retention-days: 7
