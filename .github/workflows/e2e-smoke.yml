name: E2E Smoke — Staging

# Manual-only. Fire before triggering a production release to confirm staging
# is healthy on the SHA you're about to ship.
#
# Auto-firing on every staging deploy was removed because each smoke run logs
# in 5 role accounts × multiple browser contexts × admin unscoped queries —
# at ~15-20 staging deploys/day this drove tens of thousands of unnecessary
# Firestore reads/day on staging. The Release workflow surfaces a reminder
# (PASS / NO RUN / FAIL) for the SHA being deployed when you go to approve
# the production environment gate; smoke is still recommended before every
# prod deploy, but it is no longer mandatory and no longer fires automatically.
#
# Scope: customer-facing flows only. Admin tools are tagged @admin-smoke
# (not @smoke) and run only in the full E2E suite. Admin regressions can be
# remediated post-deploy without customer impact, so they do not gate
# customer-facing releases. See FW-81 for the rationale.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: 'Commit SHA to test (defaults to current main)'
        type: string
        required: false

permissions:
  contents: read
  pull-requests: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  e2e-smoke:
    name: Playwright Smoke — Staging
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Write service account credentials
        run: |
          if [ -n "${{ secrets.E2E_FIREBASE_SERVICE_ACCOUNT_JSON }}" ]; then
            echo "${{ secrets.E2E_FIREBASE_SERVICE_ACCOUNT_JSON }}" | base64 -d > /tmp/sa.json
            echo "Service account written to /tmp/sa.json"
          else
            echo "E2E_FIREBASE_SERVICE_ACCOUNT_JSON not set — seeding will be skipped"
          fi

      - name: Run smoke suite
        env:
          E2E_BASE_URL: https://first-whistle-e76f4.web.app
          E2E_STAGING_URL: https://first-whistle-e76f4.web.app
          E2E_ADMIN_EMAIL: ${{ secrets.E2E_STAGING_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ secrets.E2E_STAGING_ADMIN_PASSWORD }}
          E2E_PARENT_EMAIL: ${{ secrets.E2E_STAGING_PARENT_EMAIL }}
          E2E_PARENT_PASSWORD: ${{ secrets.E2E_STAGING_PARENT_PASSWORD }}
          E2E_MUST_CHANGE_EMAIL: ${{ secrets.E2E_MUST_CHANGE_EMAIL }}
          E2E_MUST_CHANGE_PASSWORD: ${{ secrets.E2E_MUST_CHANGE_PASSWORD }}
          E2E_CONSENT_OUTDATED_EMAIL: ${{ secrets.E2E_CONSENT_OUTDATED_EMAIL }}
          E2E_CONSENT_OUTDATED_PASSWORD: ${{ secrets.E2E_CONSENT_OUTDATED_PASSWORD }}
          E2E_PLAYER_EMAIL: ${{ secrets.E2E_PLAYER_EMAIL }}
          E2E_PLAYER_PASSWORD: ${{ secrets.E2E_PLAYER_PASSWORD }}
          E2E_COACH_EMAIL: ${{ secrets.E2E_COACH_EMAIL }}
          E2E_COACH_PASSWORD: ${{ secrets.E2E_COACH_PASSWORD }}
          E2E_LM_EMAIL: ${{ secrets.E2E_LM_EMAIL }}
          E2E_LM_PASSWORD: ${{ secrets.E2E_LM_PASSWORD }}
          E2E_AVAIL_LEAGUE_ID: ${{ secrets.E2E_AVAIL_LEAGUE_ID }}
          E2E_AVAIL_COLLECTION_ID: ${{ secrets.E2E_AVAIL_COLLECTION_ID }}
          E2E_FUNCTIONS_BASE: ${{ secrets.E2E_FUNCTIONS_BASE }}
          E2E_RSVP_HMAC_SECRET: ${{ secrets.E2E_RSVP_HMAC_SECRET }}
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa.json
        run: npx playwright test --project=chromium --project=staging --grep @smoke

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 7

      - name: Post result to PR
        if: always()
        env:
          TARGET_SHA: ${{ inputs.sha || github.sha }}
          JOB_STATUS: ${{ job.status }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const conclusion = process.env.JOB_STATUS;
            const fullSha = process.env.TARGET_SHA;
            const sha = fullSha.slice(0, 7);
            const runUrl = `https://github.com/${process.env.REPO}/actions/runs/${process.env.RUN_ID}`;
            const icon = conclusion === 'success' ? '✅' : '❌';
            const label = conclusion === 'success' ? 'passed' : 'FAILED';

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed',
              sort: 'updated',
              direction: 'desc',
              per_page: 10,
            });

            const pr = prs.find(p =>
              p.merge_commit_sha?.startsWith(fullSha) ||
              p.head.sha === fullSha
            );
            if (!pr) return;

            const body = [
              `## ${icon} Staging Smoke ${label}`,
              '',
              `Smoke suite ran manually against staging on \`${sha}\`.`,
              '',
              `[View full report](${runUrl})`,
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body,
            });
