name: Deploy to Firebase

# Triggered on every push to main (i.e., after a PR is merged).
#
# Required GitHub secrets:
#   FIREBASE_TOKEN — long-lived CI token from: firebase login:ci
#   Add at: Settings → Secrets and variables → Actions → New repository secret

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Build frontend ────────────────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_APP_VERSION: ${{ github.ref_name }}
          VITE_BUILD_SHA: ${{ github.sha }}
          VITE_BUILD_TIME: ${{ github.event.head_commit.timestamp }}
          VITE_BUILD_BRANCH: ${{ github.ref_name }}
          VITE_BUILD_PR: ${{ github.event.pull_request.number }}
          VITE_APP_ENV: staging
          VITE_SIGNUP_ALLOWED_PREFIXES: ${{ secrets.VITE_SIGNUP_ALLOWED_PREFIXES }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        run: npm run build:staging

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/
          retention-days: 1

  # ── Build + test Cloud Functions ─────────────────────────────────────────
  build-functions:
    name: Build & Test Functions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build
        working-directory: functions
        run: npm run build

      - name: Test
        working-directory: functions
        run: npm test

      - name: Upload functions artifact
        uses: actions/upload-artifact@v4
        with:
          name: functions-lib
          path: functions/lib/
          retention-days: 1

  # ── Deploy ────────────────────────────────────────────────────────────────
  # Path-scoped: only deploy the targets whose source files changed in this
  # push. Docs-only / legal-only / test-only PRs no longer redeploy functions
  # (which re-creates Cloud Scheduler jobs and burns staging reads via
  # cold-start init). See ADR-012 for the cost-discipline rationale.
  deploy:
    name: Deploy to Firebase
    runs-on: ubuntu-latest
    needs: [build-frontend, build-functions]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            functions:
              - 'functions/**'
              - 'firebase.json'
            hosting:
              - 'src/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'tsconfig*.json'
              - 'package.json'
              - 'package-lock.json'
              - 'public/**'
            firestore:
              - 'firestore.rules'
              - 'firestore.indexes.json'
            storage:
              - 'storage.rules'
            extensions:
              - 'extensions/**'

      - id: targets
        name: Compute deploy targets
        env:
          CHANGED_FUNCTIONS: ${{ steps.changes.outputs.functions }}
          CHANGED_HOSTING: ${{ steps.changes.outputs.hosting }}
          CHANGED_FIRESTORE: ${{ steps.changes.outputs.firestore }}
          CHANGED_STORAGE: ${{ steps.changes.outputs.storage }}
          CHANGED_EXTENSIONS: ${{ steps.changes.outputs.extensions }}
        run: |
          TARGETS=()
          [ "$CHANGED_HOSTING" = "true" ] && TARGETS+=("hosting")
          [ "$CHANGED_FUNCTIONS" = "true" ] && TARGETS+=("functions")
          [ "$CHANGED_FIRESTORE" = "true" ] && TARGETS+=("firestore")
          [ "$CHANGED_STORAGE" = "true" ] && TARGETS+=("storage")
          [ "$CHANGED_EXTENSIONS" = "true" ] && TARGETS+=("extensions")
          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "No deploy targets — skipping firebase deploy."
            echo "targets=" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            JOINED=$(IFS=,; echo "${TARGETS[*]}")
            echo "Deploying targets: $JOINED"
            echo "targets=$JOINED" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        if: steps.targets.outputs.skip != 'true'
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        if: steps.targets.outputs.skip != 'true'
        run: npm ci

      - name: Download frontend dist
        if: contains(steps.targets.outputs.targets, 'hosting')
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/

      - uses: actions/setup-node@v4
        if: contains(steps.targets.outputs.targets, 'functions')
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install functions dependencies
        if: contains(steps.targets.outputs.targets, 'functions')
        working-directory: functions
        run: npm ci

      - name: Download functions lib
        if: contains(steps.targets.outputs.targets, 'functions')
        uses: actions/download-artifact@v4
        with:
          name: functions-lib
          path: functions/lib/

      - name: Install Firebase CLI
        if: steps.targets.outputs.skip != 'true'
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        if: steps.targets.outputs.skip != 'true'
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          DEPLOY_TARGETS: ${{ steps.targets.outputs.targets }}
        run: firebase deploy --token "$FIREBASE_TOKEN" --project first-whistle-e76f4 --non-interactive --force --only "$DEPLOY_TARGETS"
