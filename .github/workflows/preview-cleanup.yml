name: PR Preview Cleanup

# DISABLED — paired with preview.yml which is also disabled. With no preview
# channels being created on PR push, there's nothing to clean up on PR close.
# To re-enable: restore the `pull_request` trigger below alongside re-enabling
# preview.yml.

on:
  workflow_dispatch: {}
  # pull_request:
  #   types: [closed]
  #   branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    name: Delete Preview Channel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Delete preview channel
        run: |
          CHANNEL_ID="pr-${{ github.event.pull_request.number }}"
          firebase hosting:channel:delete "$CHANNEL_ID" \
            --token "${{ secrets.FIREBASE_TOKEN }}" \
            --project first-whistle-e76f4 \
            --force \
          || echo "Channel $CHANNEL_ID not found or already deleted — skipping."
