name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend — Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Lint
        # Runs ESLint. New errors introduced by this PR will fail the build.
        # Pre-existing errors are tracked in GitHub issue #92 (TD sprint).
        # Once issue #92 is resolved, replace with: npm run lint -- --max-warnings 0
        run: npm run lint -- --max-warnings 600

      - name: Check Zustand action deps
        # Catches the pattern: useXxxStore(s => s.action) result used in a
        # useEffect/useCallback/useMemo dep array. This causes stale closures
        # and infinite render loops. See GitHub issue #192.
        # Fix: use useXxxStore.getState().action() inside the effect body.
        run: npm run lint:zustand-deps

      - name: Run frontend tests
        run: npm test

  functions:
    name: Functions — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        # functions/package.json specifies "engines": { "node": "22" }
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Run functions tests
        working-directory: functions
        run: npm test
