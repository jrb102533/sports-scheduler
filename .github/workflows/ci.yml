name: CI

on:
  pull_request:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend:
    name: Frontend — Build, Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Lint
        # Runs ESLint. New errors introduced by this PR will fail the build.
        # Pre-existing errors are tracked in GitHub issue #92 (TD sprint).
        # Once issue #92 is resolved, replace with: npm run lint -- --max-warnings 0
        run: npm run lint -- --max-warnings 600

      - name: Check Zustand render-loop anti-patterns
        # Two checks that prevent React error #185 (infinite render loop / site outage):
        #
        # 1. Action-in-deps: useXxxStore(s => s.action) result placed in a
        #    useEffect/useCallback/useMemo dep array. Actions have unstable refs
        #    and re-trigger effects on every render -> infinite loop.
        #    Fix: use useXxxStore.getState().action() inside the effect body.
        #
        # 2. No-selector bare call: useXxxStore() with no selector subscribes the
        #    component to the ENTIRE store. Any store write causes a re-render.
        #    Combined with a mutating effect -> infinite loop (closes issue #192).
        #    Fix: use useXxxStore(s => s.field) to select only what you need.
        #
        # Pre-existing violations are allowlisted in scripts/lint-zustand-deps.js.
        # Remove an allowlist entry once the source file is fixed.
        run: npm run lint:zustand-deps

      - name: Run frontend tests
        # Dummy Firebase env vars: src/lib/firebase.ts calls getAuth() at module
        # load, which throws auth/invalid-api-key when VITE_FIREBASE_API_KEY is
        # undefined. Tests mock Firestore/Auth per-file, but the module still
        # has to import cleanly. Any non-empty strings satisfy getAuth().
        env:
          VITE_FIREBASE_API_KEY: ci-dummy-key
          VITE_FIREBASE_AUTH_DOMAIN: ci-dummy.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: ci-dummy
          VITE_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: '0'
          VITE_FIREBASE_APP_ID: '1:0:web:0'
        run: npm test

  functions:
    name: Functions — Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        # functions/package.json specifies "engines": { "node": "22" }
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        working-directory: functions
        run: npm ci

      - name: Build functions
        working-directory: functions
        run: npm run build

      - name: Run functions tests
        working-directory: functions
        run: npm test
