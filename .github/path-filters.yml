# Path filters for emulator E2E CI routing (Phase 2, issue #466)
#
# Used by dorny/paths-filter@v3 in e2e-emulator.yml to compute which domain
# buckets changed on a given PR.  The resulting tag set drives the Playwright
# --grep expression so only specs whose @<bucket> tag matches are executed.
#
# Bucket definition rules:
#   - A bucket corresponds to one @<bucket> tag used in test() titles.
#   - A path may appear in multiple buckets (e.g. firestore.rules triggers all).
#   - "shared" triggers ALL @emu specs — it covers cross-cutting infra that can
#     break any domain: layouts, router, store, UI primitives, config, deps.
#
# Adding a new bucket:
#   1. Add the bucket name + paths here.
#   2. Add a @<bucket> tag to the corresponding spec files.
#   3. The workflow picks it up automatically — no workflow edits needed.

